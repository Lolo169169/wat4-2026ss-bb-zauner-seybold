name: Load Tests (k6)

# Bewusst getrennt von der CI und nur manuell auslösbar – Load-Tests sind
# ressourcenintensiv und nicht für jeden Push gedacht.
# Voraussetzung auf dem self-hosted Runner: k6 installiert (winget GrafanaLabs.k6)
# und im PATH erreichbar, sowie Docker + Node.

on:
  workflow_dispatch:

jobs:
  load:
    runs-on: [self-hosted]
    defaults:
      run:
        shell: bash

    env:
      JWT_KEY: ci_secret_key
      PORT: "3001"
      TEST_DB_USERNAME: conduit
      TEST_DB_PASSWORD: conduit
      TEST_DB_NAME: database_testing
      TEST_DB_HOSTNAME: 127.0.0.1
      TEST_DB_DIALECT: postgres
      TEST_DB_LOGGING: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start PostgreSQL (docker compose)
        run: docker compose up -d db

      - name: Wait for PostgreSQL to be healthy
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect -f '{{.State.Health.Status}}' conduit-postgres 2>/dev/null || echo starting)
            echo "postgres health=$status"
            [ "$status" = "healthy" ] && exit 0
            sleep 2
          done
          echo "PostgreSQL did not become healthy in time" >&2
          exit 1

      - name: Start backend (test mode) and run k6 scenarios
        run: |
          NODE_ENV=test npm run start -w backend &
          BACKEND_PID=$!
          echo "backend pid=$BACKEND_PID"
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/ >/dev/null && break || sleep 2
          done
          mkdir -p tests/load/results
          k6 run --out json=tests/load/results/articles-load.json tests/load/articles-load.js
          k6 run --out json=tests/load/results/auth-stress.json tests/load/auth-stress.js
          node tests/load/analyze.js
          kill $BACKEND_PID 2>/dev/null || true

      - name: Upload load test results (charts + summary)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-results
          path: |
            tests/load/charts/
            tests/load/results/summary.md
          retention-days: 7

      - name: Stop PostgreSQL
        if: always()
        run: docker compose down
