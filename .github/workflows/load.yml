name: Load Tests (k6)

# Bewusst getrennt von der CI und nur manuell auslösbar – Load-Tests sind
# ressourcenintensiv und nicht für jeden Push gedacht.
# Voraussetzung auf dem self-hosted Runner: k6 installiert (winget GrafanaLabs.k6)
# und im PATH erreichbar, sowie Docker + Node.
# Hinweis: KEIN "shell: bash" erzwingen (WSL-Bash-Problem auf Windows-Runnern).
# Die Orchestrierung (DB + Backend starten, warten, k6, Backend stoppen)
# übernimmt das npm-Skript "test:load:local" via start-server-and-test.

on:
  workflow_dispatch:

jobs:
  load:
    runs-on: [self-hosted]

    env:
      JWT_KEY: ci_secret_key
      PORT: "3001"
      TEST_DB_USERNAME: conduit
      TEST_DB_PASSWORD: conduit
      TEST_DB_NAME: database_testing
      TEST_DB_HOSTNAME: 127.0.0.1
      TEST_DB_DIALECT: postgres
      TEST_DB_LOGGING: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run k6 load tests (startet DB + Backend, führt aus, stoppt Backend)
        run: npm run test:load:local

      - name: Upload load test results (charts + summary)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-results
          path: |
            tests/load/charts/
            tests/load/results/summary.md
          retention-days: 7

      - name: Stop PostgreSQL
        if: always()
        run: docker compose down
